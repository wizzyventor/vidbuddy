<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidBuddy Web</title>
    <style>
        :root {
            --primary: #10b981;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { color: var(--primary); margin-bottom: 0.5rem; }
        p { color: #94a3b8; margin-bottom: 2rem; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1.5rem;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover { background: #059669; transform: translateY(-2px); }
        button:disabled { background: #334155; cursor: not-allowed; }

        #status { margin-top: 1.5rem; font-size: 0.9rem; color: #10b981; }
    </style>
</head>
<body>
    <div class="container">
        <h1>VidBuddy Web</h1>
        <p>Direct Video Downloader</p>
        <input type="text" id="urlInput" placeholder="Paste video link here...">
        <button id="dlBtn" onclick="handleDownload()">Download Video</button>
        <div id="status"></div>
    </div>

    <script>
        async function handleDownload() {
            const url = document.getElementById('urlInput').value;
            const btn = document.getElementById('dlBtn');
            const status = document.getElementById('status');

            if (!url) return alert("Please paste a link!");

            btn.disabled = true;
            status.innerText = "⏳ Processing video (please wait)...";

            try {
                const response = await fetch('http://127.0.0.1:5000/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const downloadUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = "vidbuddy_video.mp4";
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    status.innerText = "✅ Download started!";
                } else {
                    status.innerText = "❌ Error: Could not process video.";
                }
            } catch (err) {
                status.innerText = "❌ Connection failed. Is the backend running?";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
