<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidBuddy Clean</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        #preview { display: none; margin-top: 20px; }
        img { width: 100%; border-radius: 10px; }
        .prog-bg { background: #334155; height: 10px; border-radius: 5px; margin: 10px 0; display: none; }
        .prog-fill { background: #10b981; height: 100%; width: 0%; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>VidBuddy</h1>
    <div class="card">
        <input type="text" id="urlInput" placeholder="Paste link here..." oninput="fetchInfo()">
        <div id="status"></div>
        
        <div id="preview">
            <img id="thumb" src="">
            <h3 id="title"></h3>
            <select id="formatSelect" style="width:100%; padding: 10px; margin-bottom: 10px;"></select>
            <button id="dlBtn" onclick="startDownload()">Download</button>
            <div class="prog-bg" id="progBg"><div class="prog-fill" id="progFill"></div></div>
        </div>
    </div>

    <script>
        let apiBase = "https://vidbuddy.onrender.com";
        let currentUrl = "";

        async function fetchInfo() {
            const url = document.getElementById('urlInput').value;
            if (url.length < 15) return;
            document.getElementById('status').innerText = "Analyzing...";
            
            try {
                const res = await fetch(`${apiBase}/info`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url: url })
                });
                const data = await res.json();
                if (data.title) {
                    currentUrl = url;
                    document.getElementById('status').innerText = "";
                    document.getElementById('preview').style.display = "block";
                    document.getElementById('thumb').src = data.thumbnail;
                    document.getElementById('title').innerText = data.title;
                    document.getElementById('formatSelect').innerHTML = data.formats.map(f => 
                        `<option value="${f.format_id}">${f.resolution} (${f.ext})</option>`
                    ).join('');
                }
            } catch (e) { document.getElementById('status').innerText = "Error loading video."; }
        }

        async function startDownload() {
            const format = document.getElementById('formatSelect').value;
            const btn = document.getElementById('dlBtn');
            const progBg = document.getElementById('progBg');
            const progFill = document.getElementById('progFill');

            btn.disabled = true;
            progBg.style.display = "block";

            try {
                const res = await fetch(`${apiBase}/download`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url: currentUrl, format_id: format })
                });

                const disposition = res.headers.get('Content-Disposition');
                let filename = "video.mp4";
                if (disposition && disposition.includes('filename=')) {
                    filename = disposition.split('filename=')[1];
                }

                const reader = res.body.getReader();
                const contentLength = +res.headers.get('Content-Length');
                let received = 0;
                let chunks = [];

                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    received += value.length;
                    progFill.style.width = ((received / contentLength) * 100) + "%";
                }

                const blob = new Blob(chunks);
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                a.click();
                btn.disabled = false;
            } catch (e) { alert("Download failed."); btn.disabled = false; }
        }
    </script>
</body>
</html>
