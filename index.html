<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidBuddy Pro Web</title>
    <script src="https://pl29119326.profitablecpmratenetwork.com/80/9e/f9/809ef9653380af167ff265991b928422.js"></script>
    <style>
        :root { --primary: #10b981; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); }
        
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Add this to your style block */
body.light-mode {
    --bg: #f8fafc;
    --card: #ffffff;
    color: #1e293b;
}
body.light-mode input {
    background: #f1f5f9;
    color: #1e293b;
    border-color: #cbd5e1;
}

        .container {
            background: var(--card);
            backdrop-filter: blur(12px);
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 500px;
            text-align: center;
        }

        /* RESPONSIVE DESIGN (Media Query) */
        @media (max-width: 480px) {
            .container { padding: 1rem; border-radius: 0; background: transparent; border: none; }
            h1 { font-size: 1.5rem; }
        }

        input {
            width: 100%; padding: 15px; margin: 1rem 0;
            border-radius: 12px; border: 1px solid #334155;
            background: #1e293b; color: white; box-sizing: border-box;
        }

        .preview-card {
            background: rgba(0,0,0,0.3);
            border-radius: 12px; padding: 10px; margin-bottom: 1rem;
            display: none; /* Hidden until link is parsed */
        }

        .preview-card img { width: 100%; border-radius: 8px; }

        .btn {
            width: 100%; padding: 15px;
            background: var(--primary); color: white;
            border: none; border-radius: 12px;
            font-weight: bold; cursor: pointer;
        }

        .ad-slot {
            margin: 20px 0; width: 100%; max-width: 728px;
            min-height: 90px; background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center;
            border: 1px dashed #334155; color: #475569;
        }
    </style>
</head>
<body>
    <button onclick="toggleTheme()" style="position: absolute; top: 10px; right: 10px; padding: 5px 10px; border-radius: 8px; cursor: pointer;">🌓 Toggle Color Mode</button>
    <div class="ad-slot">
        <script src="https://pl29119327.profitablecpmratenetwork.com/bb/de/f6/bbdef6f29c8163537c613a0fc6cc21e2.js"></script>
    </div>

    <div class="container">
        <h1>VidBuddy Pro</h1>
        <p>Premium Video Downloader</p>
        
        <input type="text" id="urlInput" placeholder="Paste link..." oninput="fetchInfo()">
        
        <div id="preview" class="preview-card">
            <img id="thumb" src="" alt="Thumbnail">
            <h4 id="videoTitle"></h4>
            <select id="formatSelect" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px;"></select>
            <button class="btn" id="dlBtn" onclick="startDownloadWithAd()">Download Now</button>
        </div>

        <div id="status" style="margin-top:10px;"></div>
    </div>
    <script>
    let currentUrl = "";

    // Toggle Dark/Light Mode
    function toggleTheme() {
    document.body.classList.toggle('light-mode');
}

    async function fetchInfo() {
        const url = document.getElementById('urlInput').value;
        if (url.length < 10) return;
        
        document.getElementById('status').innerText = "🔍 Fetching video info...";
        
        try {
            const res = await fetch('https://vidbuddy.onrender.com/info', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ url: url })
            });
            const data = await res.json();
            
            if (data.title) {
                currentUrl = url;
                document.getElementById('preview').style.display = 'block';
                document.getElementById('thumb').src = data.thumbnail;
                document.getElementById('videoTitle').innerText = data.title;
                
                const select = document.getElementById('formatSelect');
                select.innerHTML = data.formats.map(f => 
                    `<option value="${f.format_id}">${f.resolution} (${f.ext})</option>`
                ).join('');
                document.getElementById('status').innerText = "";
            }
        } catch (e) { 
            document.getElementById('status').innerText = "❌ Backend not connected.";
            console.log(e); 
        }
    }

    // This fixes the 'startDownloadWithAd' issue
    async function startDownloadWithAd() {
        // Here you can trigger an ad pop-up manually if your network allows it
        // Then proceed to the actual download
        startDownload();
    }

    async function startDownload() {
        const btn = document.getElementById('dlBtn');
        const format = document.getElementById('formatSelect').value;
        btn.disabled = true;
        document.getElementById('status').innerText = "📥 Downloading...";

        try {
            const res = await fetch('https://vidbuddy.onrender.com/download', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ url: currentUrl, format_id: format })
            });

            if (res.ok) {
                const blob = await res.blob();
                const a = document.createElement('a');
                a.href = window.URL.createObjectURL(blob);
                a.download = "vidbuddy_video.mp4";
                a.click();
                document.getElementById('status').innerText = "✅ Done!";
                
                // Feature: Simple Download History (Local Storage)
                let history = JSON.parse(localStorage.getItem('vidbuddy_history') || "[]");
                history.push(document.getElementById('videoTitle').innerText);
                localStorage.setItem('vidbuddy_history', JSON.stringify(history.slice(-5)));
            }
        } catch (e) {
            document.getElementById('status').innerText = "❌ Download failed.";
        }
        btn.disabled = false;
    }
</script>

</body>
</html>
