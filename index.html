<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VidBuddy Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #10b981;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        /* --- MEDIA QUERY FOR SMALLER DEVICES --- */
        @media (max-width: 380px) {
            .glass-card {
                padding: 20px;
                width: 85%;
            }
            h2 { font-size: 1.2rem; }
            .process-btn { padding: 12px; }
        }

        .input-group {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 12px;
            color: white;
            outline: none;
            text-align: center;
            box-sizing: border-box;
        }

        .process-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        #status { margin-top: 15px; font-size: 12px; color: #10b981; }
    </style>
</head>
<body>

<div class="glass-card">
    <h2>VidBuddy Pro</h2>
    <p>Premium Downloader</p>

    <div class="input-group">
        <input type="text" id="videoUrl" placeholder="Paste link here...">
    </div>

    <button class="process-btn" onclick="sendToBot()">Process Video</button>
    <div id="status"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Check if URL was passed from the bot
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('url')) {
        document.getElementById('videoUrl').value = urlParams.get('url');
    }

    function sendToBot() {
        const url = document.getElementById('videoUrl').value;
        if (!url) {
            tg.showAlert("Please enter a URL");
            return;
        }

        document.getElementById('status').innerText = "🚀 Sent! Closing app...";
        
        // CRITICAL: This sends the data AND closes the webview
        tg.sendData(JSON.stringify({
            "url": url,
            "quality": "720"
        }));
        
        // If sendData fails to close it (in some versions), we force it
        setTimeout(() => { tg.close(); }, 500);
    }
</script>
</body>
</html>
